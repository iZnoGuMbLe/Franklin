services:
  db:
    image: postgres:16
    container_name: smartspend_db
    environment:
      POSTGRES_USER: smartspend
      POSTGRES_PASSWORD: smartspend
      POSTGRES_DB: smartspend
    ports:
      - "5433:5432"   # 5433 снаружи, чтобы не конфликтовать с Citus на 5432
    volumes:
      - smartspend_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: smartspend_redis
    ports:
      - "6379:6379"

volumes:
  smartspend_pgdata:
